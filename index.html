<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Global Info Systems | Data Analytics & Cloud Services</title>

  <!-- SEO -->
  <link rel="canonical" href="https://globalinfosysindia.com/" />
  <meta name="description" content="Global Info Systems provides enterprise data analytics, cloud services, and IT consulting solutions.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Redirect index.html → / -->
  <script>
    if (window.location.pathname.endsWith("index.html")) {
      window.location.replace("/");
    }
  </script>

  <link rel="stylesheet" href="style.css" />
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="container nav">
    <a href="/" class="logo-wrap">
      <img src="logo.png" alt="Global Info Systems Logo">
      <span class="brand-text">
        <span class="brand-main">GLOBAL INFO SYSTEMS</span>
        <span class="brand-sub">Data • Cloud • AI</span>
      </span>
    </a>

    <nav class="main-nav">
      <a href="/" class="nav-link active" data-page="home">Home</a>
      <a href="#services" class="nav-link" data-page="services">Services</a>
      <a href="#industries" class="nav-link" data-page="industries">Industries</a>
      <a href="#tech" class="nav-link" data-page="tech">Technologies</a>
      <a href="#contact" class="nav-link" data-page="contact">Contact</a>
    </nav>
  </div>
</header>

<!-- HERO -->
<section class="hero-slider animate">
  <div class="hero-content">
    <h1 class="hero-title">
      Engineering <span>Digital Futures</span>
    </h1>

    <p class="hero-subtitle">
      Data Analytics • Cloud Transformation • Enterprise IT Services
    </p>

    <div class="hero-cta">
      <a href="#services" class="btn primary">Explore Our Services</a>
      <a href="#contact" class="btn outline">Talk to Our Experts</a>
    </div>
  </div>
</section>

<!-- (Your other sections remain unchanged) -->

<footer>
  © 2026 Global Info Systems. All rights reserved.
</footer>

<!-- NAV ACTIVE SCRIPT -->
<script>
  const navLinks = document.querySelectorAll(".nav-link");
  const sections = document.querySelectorAll("section[id]");

  function setActiveLink() {
    let current = "";
    sections.forEach(section => {
      if (scrollY >= section.offsetTop - 120) {
        current = section.id;
      }
    });

    navLinks.forEach(link => {
      link.classList.remove("active");
      if (
        (current === "" && link.dataset.page === "home") ||
        link.dataset.page === current
      ) {
        link.classList.add("active");
      }
    });
  }

  window.addEventListener("scroll", setActiveLink);
  window.addEventListener("load", setActiveLink);
</script>

<!-- SCROLL ANIMATION -->
<script>
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) entry.target.classList.add("show");
    });
  }, { threshold: 0.15 });

  document.querySelectorAll(".animate").forEach(el => observer.observe(el));
</script>

</body>
</html>
